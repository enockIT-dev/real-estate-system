<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Real Estate System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        header { background: #2c3e50; color: white; padding: 1rem 0; }
        nav { background: #34495e; padding: 0; }
        nav ul { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; }
        nav li { flex: 1 1 200px; text-align: center; }
        nav a { display: block; color: white; padding: 1rem; text-decoration: none; transition: background 0.3s; }
        nav a:hover, nav a.active { background: #2c3e50; }
        main { padding: 2rem; max-width: 1200px; margin: auto; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .admin-card { background: #f8f9fa; padding: 2rem; border-radius: 10px; text-align: center; }
        .admin-card a { background: #e74c3c; color: white; padding: 1rem 2rem; text-decoration: none; border-radius: 5px; display: block; margin-top: 1rem; }
        .admin-card a:hover { background: #c0392b; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
    </style>
</head>
<body>
    <header>
        <h2>🏠 Real Estate System - Admin</h2>
    </header>
    <nav id="main-nav"><!-- nav --></nav>
    <main>
        <h1>Admin Dashboard</h1>
        <div class="admin-grid">
            <div class="admin-card">
                <h3>Manage Properties</h3>
                <p>Add, edit, delete properties</p>
                <a href="add-property.html">Go to Properties</a>
            </div>
            <div class="admin-card">
                <h3>Manage Agents</h3>
                <p>View and edit agents</p>
                <a href="agents.html">Manage Agents</a>
            </div>
            <div class="admin-card">
                <h3>View Reports</h3>
                <p>Analytics and reports</p>
                <a href="reports.html">View Reports</a>
            </div>
            <div class="admin-card">
                <h3>System Settings</h3>
                <p>Configure system</p>
                <a href="settings.html">Settings</a>
            </div>
        </div>
    </main>
    <footer><!-- footer --></footer>
    <script>
        highlightNav();
        // Admin check mock
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.email !== 'teecee@gmail.com') {
            alert('Admin access required (teecee@gmail.com)');
            window.location.href = 'dashboard.html';
        }
    </script>

</body>
</html>
