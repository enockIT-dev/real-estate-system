<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Real Estate System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        header { background: #2c3e50; color: white; padding: 1rem 0; }
        nav { background: #34495e; padding: 0; }
        nav ul { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; }
        nav li { flex: 1 1 200px; text-align: center; }
        nav a { display: block; color: white; padding: 1rem; text-decoration: none; transition: background 0.3s; }
        nav a:hover, nav a.active { background: #2c3e50; }
        main { padding: 2rem; max-width: 1400px; margin: auto; }
        .analytics-header { text-align: center; margin-bottom: 3rem; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
        .chart-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .chart-canvas { height: 300px; width: 100%; }
        .date-range { text-align: center; margin-bottom: 2rem; }
        .date-range input { padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; margin: 0 0.5rem; }
        button { background: #3498db; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 5px; cursor: pointer; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
        .metric-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; border-radius: 15px; text-align: center; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
    </style>
</head>
<body>
    <header>
        <h2>🏠 Real Estate System</h2>
    </header>
    <nav id="main-nav"><!-- nav --></nav>
    <main>
        <div class="analytics-header">
            <h1>Analytics Dashboard</h1>
            <p>Business insights and performance metrics</p>
        </div>
        <div class="date-range">
            <input type="date" id="startDate">
            <input type="date" id="endDate">
            <button onclick="updateAnalytics()">Update</button>
        </div>
        <div class="charts-grid">
            <div class="chart-card">
                <h3>Revenue Over Time</h3>
                <canvas id="revenueChart" class="chart-canvas"></canvas>
            </div>
            <div class="chart-card">
                <h3>Bookings Trend</h3>
                <canvas id="bookingsChart" class="chart-canvas"></canvas>
            </div>
            <div class="chart-card">
                <h3>Properties Views</h3>
                <canvas id="viewsChart" class="chart-canvas"></canvas>
            </div>
        </div>
        <div class="metrics-grid">
            <div class="metric-card">
                <h2 id="totalRevenue">$45,230</h2>
                <p>Total Revenue</p>
            </div>
            <div class="metric-card">
                <h2 id="totalBookings">127</h2>
                <p>Total Bookings</p>
            </div>
            <div class="metric-card">
                <h2 id="conversionRate">12.5%</h2>
                <p>Conversion Rate</p>
            </div>
            <div class="metric-card">
                <h2 id="activeUsers">2,450</h2>
                <p>Active Users</p>
            </div>
        </div>
    </main>
    <footer><!-- footer --></footer>
    <script>
        highlightNav();
        
        // Chart.js CDN for real charts (optional)
        // Simple canvas charts
        function drawAnalyticsChart(canvasId, data, labels, title) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const max = Math.max(...data);
            data.forEach((val, i) => {
                ctx.fillStyle = `hsl(${i * 30}, 70%, 50%)`;
                const barHeight = (val / max) * 250;
                ctx.fillRect(60 + i * 80, 300 - barHeight, 60, barHeight);
                ctx.fillStyle = '#333';
                ctx.font = '12px Arial';
                ctx.fillText(labels[i], 65 + i * 80, 320);
                ctx.fillText(val, 70 + i * 80, 290 - barHeight);
            });
        }
        
        drawAnalyticsChart('revenueChart', [5000, 7000, 6000, 9000, 8000, 11000], ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], 'Revenue');
        drawAnalyticsChart('bookingsChart', [25, 35, 30, 45, 40, 55], ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], 'Bookings');
        drawAnalyticsChart('viewsChart', [1200, 1500, 1800, 2000, 2200, 2500], ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'], 'Views');
        
        function updateAnalytics() {
            alert('Analytics updated with new date range!');
        }
    </script>
</body>
</html>
