<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Real Estate System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; display: flex; flex-direction: column; height: 100vh; }
        header { background: #2c3e50; color: white; padding: 1rem 0; }
        nav { background: #34495e; padding: 0; flex-shrink: 0; }
        main { flex: 1; padding: 1rem; display: flex; gap: 1rem; }
        .chat-list { flex: 1; background: #f8f9fa; border-radius: 10px; padding: 1rem; overflow-y: auto; }
        .chat-thread { flex: 2; background: white; border-radius: 10px; padding: 1rem; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; margin-bottom: 1rem; }
        .message { margin-bottom: 1rem; padding: 0.75rem; border-radius: 10px; }
        .message.sent { background: #3498db; color: white; margin-left: 20%; }
        .message.received { background: #ecf0f1; margin-right: 20%; }
        .message-input { display: flex; gap: 1rem; }
        .message-input input { flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 20px; }
        .send-btn { background: #27ae60; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 20px; cursor: pointer; }
        .chat-user { padding: 1rem; border-bottom: 1px solid #ddd; cursor: pointer; }
        .chat-user.active { background: #3498db; color: white; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 1rem; flex-shrink: 0; }
        @media (max-width: 768px) { main { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <h2>🏠 Real Estate System</h2>
    </header>
    <nav id="main-nav"><!-- nav --></nav>
    <main>
        <div class="chat-list">
            <div class="chat-user active" onclick="switchChat(1)">Agent John Doe</div>
            <div class="chat-user" onclick="switchChat(2)">Client Jane</div>
        </div>
        <div class="chat-thread">
            <div id="messages" class="chat-messages">
                <div class="message received">Hello! How can I help with the property?</div>
            </div>
            <div class="message-input">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>
    <footer><!-- footer --></footer>
    <script>
        highlightNav();
        
        let currentChatId = 1;
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (msg) {
                document.getElementById('messages').innerHTML += `<div class="message sent">${msg}</div>`;
                input.value = '';
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }
        }
        
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        function switchChat(id) {
            currentChatId = id;
            document.querySelectorAll('.chat-user').forEach(u => u.classList.remove('active'));
            event.target.classList.add('active');
            // Load different messages
            document.getElementById('messages').innerHTML = id === 1 ? 
                '<div class="message received">Hello from agent!</div>' : 
                '<div class="message sent">Hi Jane, about the property...</div>';
        }
    </script>
</body>
</html>
