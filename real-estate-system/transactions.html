<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Real Estate System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        header { background: #2c3e50; color: white; padding: 1rem 0; }
        nav { background: #34495e; padding: 0; }
        nav ul { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; }
        nav li { flex: 1 1 200px; text-align: center; }
        nav a { display: block; color: white; padding: 1rem; text-decoration: none; transition: background 0.3s; }
        nav a:hover, nav a.active { background: #2c3e50; }
        main { padding: 2rem; max-width: 1200px; margin: auto; }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
        .summary-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; border-radius: 15px; text-align: center; }
        .transactions-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .transactions-table th { background: #f8f9fa; padding: 1.5rem 1rem; text-align: left; font-weight: bold; }
        .transactions-table td { padding: 1.5rem 1rem; border-bottom: 1px solid #eee; }
        .status { padding: 0.25rem 0.75rem; border-radius: 20px; color: white; font-size: 0.85rem; font-weight: bold; }
        .status.completed { background: #27ae60; }
        .status.pending { background: #f39c12; }
        .status.failed { background: #e74c3c; }
        .amount { font-weight: bold; font-size: 1.1rem; }
        .amount.positive { color: #27ae60; }
        .amount.negative { color: #e74c3c; }
        .filters { margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
        .filters select, .filters input { padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; }
        button.filter-btn { background: #3498db; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 5px; cursor: pointer; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
    </style>
</head>
<body>
    <header>
        <h2>🏠 Real Estate System</h2>
    </header>
    <nav id="main-nav"><!-- nav --></nav>
    <main>
        <h1>My Transactions</h1>
        <div class="summary-cards">
            <div class="summary-card">
                <h3 id="totalBalance">$12,450</h3>
                <p>Current Balance</p>
            </div>
            <div class="summary-card">
                <h3 id="totalIncome">$45,230</h3>
                <p>Total Income</p>
            </div>
            <div class="summary-card">
                <h3 id="totalSpent">$32,780</h3>
                <p>Total Spent</p>
            </div>
        </div>
        <div class="filters">
            <select id="statusFilter">
                <option>All Status</option>
                <option>Completed</option>
                <option>Pending</option>
                <option>Failed</option>
            </select>
            <input type="date" id="dateFilter">
            <button class="filter-btn" onclick="filterTransactions()">Filter</button>
            <button class="filter-btn" onclick="exportTransactions()" style="background: #27ae60;">Export CSV</button>
        </div>
        <table class="transactions-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="transactionsBody">
                <!-- Dynamic -->
            </tbody>
        </table>
    </main>
    <footer><!-- footer --></footer>
    <script>
        highlightNav();
        
        const mockTransactions = [
            {id:1, date:'2024-10-15', desc:'Property sale commission', amount:2500, status:'completed'},
            {id:2, date:'2024-10-14', desc:'Booking fee', amount:-150, status:'completed'},
            {id:3, date:'2024-10-12', desc:'Advertising payment', amount:-500, status:'completed'},
            {id:4, date:'2024-10-10', desc:'Client payment', amount:3200, status:'pending'},
        ];
        
        function renderTransactions(transactions = mockTransactions) {
            document.getElementById('transactionsBody').innerHTML = transactions.map(t => `
                <tr>
                    <td>${t.date}</td>
                    <td>${t.desc}</td>
                    <td class="amount ${t.amount > 0 ? 'positive' : 'negative'}">${t.amount > 0 ? '+' : ''}$${Math.abs(t.amount)}</td>
                    <td><span class="status ${t.status}">${t.status.toUpperCase()}</span></td>
                    <td>
                        <button onclick="viewTransaction(${t.id})">View</button>
                        ${t.status !== 'completed' ? `<button onclick="retryTransaction(${t.id})" style="background: #f39c12; margin-left: 0.5rem;">Retry</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }
        
        function filterTransactions() {
            // Filter logic
            renderTransactions(mockTransactions);
        }
        
        function exportTransactions() {
            alert('Transactions exported as CSV!');
        }
        
        function viewTransaction(id) {
            alert(`Viewing transaction ${id}`);
        }
        
        function retryTransaction(id) {
            alert(`Retrying transaction ${id}`);
        }
        
        renderTransactions();
    </script>
</body>
</html>
