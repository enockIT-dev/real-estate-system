<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Property - Real Estate System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        header { background: #2c3e50; color: white; padding: 1rem 0; }
        nav { background: #34495e; padding: 0; }
        nav ul { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; }
        nav li { flex: 1 1 200px; text-align: center; }
        nav a { display: block; color: white; padding: 1rem; text-decoration: none; transition: background 0.3s; }
        nav a:hover, nav a.active { background: #2c3e50; }
        main { padding: 2rem; max-width: 600px; margin: auto; }
        .form-container { background: #f8f9fa; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #27ae60; color: white; padding: 1rem 2rem; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1.1rem; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
    </style>
</head>
<body>
    <header>
        <h2>🏠 Real Estate System</h2>
    </header>
    <nav id="main-nav"><!-- nav --></nav>
    <main>
        <div class="form-container">
            <h1>Add New Property</h1>
            <form id="addPropertyForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label for="price">Price (KWD)</label>
                    <input type="number" id="price" required>
                </div>
                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" required>
                </div>
                <div class="form-group">
                    <label for="desc">Description</label>
                    <textarea id="desc" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="agent">Agent</label>
                    <select id="agent">
                        <option>Agent 1</option>
                        <option>Agent 2</option>
                    </select>
                </div>
                <button type="submit">Add Property</button>
            </form>
        </div>
    </main>
    <footer><!-- footer --></footer>
    <script>
        highlightNav();
        
        document.getElementById('addPropertyForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const properties = JSON.parse(localStorage.getItem('properties') || '[]');
            const newProp = {
                id: properties.length + 1,
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                location: document.getElementById('location').value,
                desc: document.getElementById('desc').value,
                agent: document.getElementById('agent').value,
                img: `https://source.unsplash.com/400x300/?house,${Math.random()}`
            };
            properties.push(newProp);
            localStorage.setItem('properties', JSON.stringify(properties));
            alert('Property added successfully!');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
