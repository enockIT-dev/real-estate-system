<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Property - Real Estate System</title>
    <style>
        /* Similar to edit */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        header { background: #2c3e50; color: white; padding: 1rem 0; }
        nav { background: #34495e; padding: 0; }
        nav ul { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; }
        nav li { flex: 1 1 200px; text-align: center; }
        nav a { display: block; color: white; padding: 1rem; text-decoration: none; transition: background 0.3s; }
        nav a:hover, nav a.active { background: #2c3e50; }
        main { padding: 2rem; max-width: 600px; margin: auto; text-align: center; }
        .delete-container { background: #f8f9fa; padding: 3rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .property-preview { background: white; padding: 2rem; border-radius: 10px; margin: 2rem 0; }
        .delete-btn { background: #e74c3c; color: white; padding: 1rem 3rem; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1rem; margin: 0.5rem; }
        .cancel-btn { background: #95a5a6; color: white; padding: 1rem 3rem; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1rem; margin: 0.5rem; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
    </style>
</head>
<body>
    <header>
        <h2>🏠 Real Estate System</h2>
    </header>
    <nav id="main-nav"><!-- nav --></nav>
    <main>
        <div class="delete-container">
            <h1>Confirm Delete Property</h1>
            <p>Are you sure you want to delete this property? This action cannot be undone.</p>
            <div id="propertyPreview" class="property-preview">
                <h3>Loading...</h3>
            </div>
            <button class="delete-btn" onclick="confirmDelete()">Yes, Delete</button>
            <button class="cancel-btn" onclick="window.location.href='properties.html'">Cancel</button>
        </div>
    </main>
    <footer><!-- footer --></footer>
    <script>
        highlightNav();
        
        const urlParams = new URLSearchParams(window.location.search);
        const propId = parseInt(urlParams.get('id'));
        const properties = JSON.parse(localStorage.getItem('properties') || '[]');
        const property = properties.find(p => p.id === propId);
        
        if (property) {
            document.getElementById('propertyPreview').innerHTML = `
                <h3>${property.title}</h3>
                <p>$${property.price}K - ${property.location}</p>
                <p>${property.desc.substring(0,100)}...</p>
            `;
        }
        
        function confirmDelete() {
            const newProps = properties.filter(p => p.id !== propId);
            localStorage.setItem('properties', JSON.stringify(newProps));
            alert('Property deleted permanently!');
            window.location.href = 'properties.html';
        }
    </script>
</body>
</html>
