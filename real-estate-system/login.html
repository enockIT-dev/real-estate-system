<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Real Estate System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; display: flex; min-height: 100vh; }
        header { background: #2c3e50; color: white; padding: 1rem 0; position: fixed; width: 100%; top: 0; z-index: 10; }
        nav { background: #34495e; padding: 0; margin-top: 80px; }
        nav ul { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; }
        nav li { flex: 1 1 200px; text-align: center; }
        nav a { display: block; color: white; padding: 1rem; text-decoration: none; transition: background 0.3s; }
        nav a:hover, nav a.active { background: #2c3e50; }
        main { flex: 1; padding: 100px 2rem 2rem; max-width: 400px; margin: auto; }
        .form-container { background: #f8f9fa; padding: 2rem; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="email"], input[type="password"] { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3498db; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1rem; }
        button:hover { background: #2980b9; }
        .error { color: #e74c3c; margin-top: 0.5rem; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 1rem; position: fixed; bottom: 0; width: 100%; }
        @media (max-width: 768px) { nav ul { flex-direction: column; } }
    </style>
</head>
<body>
    <header>
        <h2>🏠 Real Estate System</h2>
    </header>
    <nav id="main-nav">
        <ul><!-- Same 32 nav links as index.html --></ul>
    </nav>
    <main>
        <div class="form-container">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Login</button>
                <div id="errorMsg" class="error"></div>
            </form>
            <p style="text-align: center; margin-top: 1rem;">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </main>
    <footer>
        <p>&copy; 2024 Real Estate System.</p>
    </footer>
    <script>
        // Shared nav
        function highlightNav() {
            const current = location.pathname.split('/').pop() || 'index.html';
            document.querySelectorAll('nav a').forEach((a, idx) => {
                const hrefs = ['index.html','login.html','register.html','dashboard.html','properties.html','property-details.html','agents.html','clients.html','bookings.html','payments.html','reports.html','contact.html','about.html','admin.html','add-property.html','edit-property.html','delete-property.html','search.html','favorites.html','messages.html','notifications.html','settings.html','profile.html','terms.html','help.html','faq.html','logout.html','analytics.html','reviews.html','transactions.html','map.html','error.html'];
                a.classList.toggle('active', hrefs[idx] === current);
            });
        }

        // Login functionality
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email === 'teecee@gmail.com' && password === 'teecee') {
                localStorage.setItem('user', JSON.stringify({email, name: 'Admin Teecee', loggedIn: true, isAdmin: true}));
                alert('Admin login successful!');
                window.location.href = 'admin.html';
            } else if (email && password) {
                localStorage.setItem('user', JSON.stringify({email, name: email.split('@')[0], loggedIn: true}));
                alert('Login successful!');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').textContent = 'Invalid credentials. Admin: teecee@gmail.com / teecee';
            }
        });

        highlightNav();
    </script>
</body>
</html>
