<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients - Real Estate System</title>
    <style>
        /* Same as agents */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        header { background: #2c3e50; color: white; padding: 1rem 0; }
        nav { background: #34495e; padding: 0; }
        nav ul { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; }
        nav li { flex: 1 1 200px; text-align: center; }
        nav a { display: block; color: white; padding: 1rem; text-decoration: none; transition: background 0.3s; }
        nav a:hover, nav a.active { background: #2c3e50; }
        main { padding: 2rem; max-width: 1200px; margin: auto; }
        .clients-table { width: 100%; border-collapse: collapse; margin-top: 2rem; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .clients-table th, .clients-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
        .clients-table th { background: #f8f9fa; font-weight: bold; }
        .btn { background: #3498db; color: white; padding: 0.5rem 1rem; border-radius: 5px; text-decoration: none; margin-right: 0.5rem; }
        .btn.delete { background: #e74c3c; }
        .add-client { background: #27ae60; padding: 1rem 2rem; font-size: 1.1rem; display: inline-block; margin-bottom: 2rem; }
        footer { background: #2c3e50; color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
        @media (max-width: 768px) { nav ul { flex-direction: column; } .clients-table { font-size: 0.9rem; } }
    </style>
</head>
<body>
    <header>
        <h2>🏠 Real Estate System</h2>
    </header>
    <nav id="main-nav"><!-- nav --></nav>
    <main>
        <a href="#" class="add-client btn" onclick="showAddClientForm()">+ Add Client</a>
        <h2>Clients Management</h2>
        <table class="clients-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Bookings</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="clientsTableBody">
                <!-- Dynamic -->
            </tbody>
        </table>
        <div id="addClientForm" style="display: none; background: #f8f9fa; padding: 2rem; border-radius: 10px; margin-top: 2rem;">
            <h3>Add New Client</h3>
            <input type="text" id="clientName" placeholder="Name" style="width: 200px; padding: 0.5rem; margin-right: 1rem;">
            <input type="email" id="clientEmail" placeholder="Email" style="width: 200px; padding: 0.5rem; margin-right: 1rem;">
            <input type="tel" id="clientPhone" placeholder="Phone" style="width: 200px; padding: 0.5rem;">
            <button class="btn" onclick="addClient()">Add</button>
            <button class="btn delete" onclick="hideAddClientForm()">Cancel</button>
        </div>
    </main>
    <footer><!-- footer --></footer>
    <script>
        highlightNav();
        
        let clients = JSON.parse(localStorage.getItem('clients') || '[]');
        
        function renderClients() {
            document.getElementById('clientsTableBody').innerHTML = clients.map(c => `
                <tr>
                    <td>${c.name}</td>
                    <td>${c.email}</td>
                    <td>${c.phone}</td>
                    <td>${c.bookings || 0}</td>
                    <td>
                        <a href="#" class="btn" onclick="viewClient(${c.id})">View</a>
                        <a href="#" class="btn delete" onclick="deleteClient(${c.id}); return false;">Delete</a>
                    </td>
                </tr>
            `).join('');
        }
        
        function addClient() {
            const name = document.getElementById('clientName').value;
            const email = document.getElementById('clientEmail').value;
            const phone = document.getElementById('clientPhone').value;
            if (name && email) {
                clients.push({id: Date.now(), name, email, phone, bookings: 0});
                localStorage.setItem('clients', JSON.stringify(clients));
                renderClients();
                hideAddClientForm();
            }
        }
        
        function showAddClientForm() { document.getElementById('addClientForm').style.display = 'block'; }
        function hideAddClientForm() { document.getElementById('addClientForm').style.display = 'none'; document.getElementById('addClientForm').querySelectorAll('input').forEach(i => i.value = ''); }
        
        function deleteClient(id) {
            if (confirm('Delete client?')) {
                clients = clients.filter(c => c.id !== id);
                localStorage.setItem('clients', JSON.stringify(clients));
                renderClients();
            }
        }
        
        renderClients();
    </script>
</body>
</html>
